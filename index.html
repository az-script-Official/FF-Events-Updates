        .social-icon.github:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
        .social-icon svg{width:22px;height:22px}
    </style>

(function(){const c=document.getElementById('particleCanvas'),x=c.getContext('2d');let p=[];const N=60,D=150;function r(){c.width=window.innerWidth;c.height=window.innerHeight}r();window.addEventListener('resize',r);for(let i=0;i<N;i++){p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,s:Math.random()*2+1,o:Math.random()*0.5+0.2})}function a(){x.clearRect(0,0,c.width,c.height);p.forEach(q=>{q.x+=q.vx;q.y+=q.vy;if(q.x<0)q.x=c.width;if(q.x>c.width)q.x=0;if(q.y<0)q.y=c.height;if(q.y>c.height)q.y=0;x.beginPath();x.arc(q.x,q.y,q.s,0,Math.PI*2);x.fillStyle='rgba(99,179,237,'+q.o+')';x.fill()});for(let i=0;i<p.length;i++){for(let j=i+1;j<p.length;j++){const dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<D){const al=(1-d/D)*0.15;x.beginPath();x.moveTo(p[i].x,p[i].y);x.lineTo(p[j].x,p[j].y);x.strokeStyle='rgba(99,179,237,'+al+')';x.lineWidth=0.5;x.stroke()}}}requestAnimationFrame(a)}a()})();

function copyToClipboard(b,t){navigator.clipboard.writeText(t).then(()=>{const o=b.innerHTML;b.innerHTML='<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';b.classList.add('success');setTimeout(()=>{b.innerHTML=o;b.classList.remove('success')},1500)}).catch(()=>{})}
async function downloadImage(b,u){try{const r=await fetch(u);if(!r.ok)throw new Error();const bl=await r.blob(),bu=URL.createObjectURL(bl),a=document.createElement('a');a.style.display='none';a.href=bu;a.download=u.split('/').pop().split('?')[0]||'image.jpg';document.body.appendChild(a);a.click();URL.revokeObjectURL(bu);document.body.removeChild(a)}catch(e){const a=document.createElement('a');a.href=u;a.download='image.jpg';a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a)}}
async function selectRegion(r){currentRegion=r;currentGlobalLangIndex=0;document.getElementById('mainView').classList.add('hidden');document.getElementById('footer').classList.add('hidden');document.getElementById('regionView').classList.remove('hidden');document.getElementById('contentArea').classList.add('hidden');document.getElementById('topBar').style.display='none';document.getElementById('globalSwitchBtn').classList.add('hidden');document.getElementById('loader').style.display='block';const l=regionLangs[r];await Promise.all(l.map(x=>fetchApi(r,x)));const g=document.getElementById('globalSwitchBtn');if(l.length>1){g.classList.remove('hidden');updateGlobalButtonText()}else{g.classList.add('hidden')}document.getElementById('loader').style.display='none';await renderAllCards(l[0]);document.getElementById('topBar').style.display='flex';document.getElementById('contentArea').classList.remove('hidden')}
function updateGlobalButtonText(){document.getElementById('globalSwitchBtn').innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;margin-inline-end:8px;"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span>تبديل لغة أحداث</span>'}
function toggleGlobalLang(){const l=regionLangs[currentRegion];if(l.length<=1)return;currentGlobalLangIndex=(currentGlobalLangIndex+1)%l.length;updateGlobalButtonText();renderAllCards(l[currentGlobalLangIndex])}
async function renderAllCards(tl){const d=await cache[currentRegion][tl],sg=document.getElementById('splashGrid'),ng=document.getElementById('newsGrid'),st=document.getElementById('splashSectionTitle'),nt=document.getElementById('newsSectionTitle');sg.innerHTML='';ng.innerHTML='';if(!d||!d.success){st.style.display='none';nt.style.display='none';return}if(d.splash_data&&d.splash_data.length>0){st.style.display='block';d.splash_data.forEach((it,i)=>{const c=document.createElement('div');c.className='data-card';c.id='splash-card-'+i;c.innerHTML=buildSplashInner(it,i,tl);sg.appendChild(c)})}else{st.style.display='none'}if(d.news_data&&d.news_data.length>0){nt.style.display='block';d.news_data.forEach((it,i)=>{const c=document.createElement('div');c.className='data-card';c.id='news-card-'+i;c.innerHTML=buildNewsInner(it,i,tl);ng.appendChild(c)})}else{nt.style.display='none'}}
function buildSplashInner(it,i,cl){let rh='';if(isValidUrl(it.sub_go_pos)){let su=it.sub_go_pos.trim();rh='<p><strong>رابط التحويل:</strong> <a href="'+su+'" target="_blank">فتح الرابط</a> '+createCopyBtn(su)+'</p>'}const fu=fixImageUrl(it.image_url);let ig='<img src="'+fu+'" loading="lazy" alt="Splash" onclick="toggleCard(this)" onerror="this.onerror=null;this.src=\''+placeholderImageAr+'\';">';if(!fu)ig='<img src="'+placeholderImageAr+'" loading="lazy" onclick="toggleCard(this)" alt="قريباً">';let dh=fu?'<p><strong>تحميل الصورة:</strong> '+createDownloadBtn(fu)+'</p>':'';return ig+'<div class="data-card-header" onclick="toggleCard(this)"><p class="data-card-title">'+(it.name||'N/A')+'</p><span class="toggle-icon">&#9660;</span></div><div class="data-card-details"><div class="data-card-info"><p><strong>البداية:</strong> <span style="display:inline-block;direction:ltr;">'+formatTimestamp(it.start_time)+'</span></p><p><strong>النهاية:</strong> <span style="display:inline-block;direction:ltr;">'+formatTimestamp(it.end_time)+'</span></p>'+dh+rh+'</div></div>'}
function buildNewsInner(it,i,cl){let dh='',lh='';if(it.desc&&String(it.desc).trim()!==""&&String(it.desc).trim()!=="0"){if(isValidUrl(it.desc)){let su=it.desc.trim();lh+='<p><strong>الرابط:</strong> <a href="'+su+'" target="_blank">فتح الرابط</a> '+createCopyBtn(su)+'</p>'}else{let fd=formatFreeFireText(it.desc);dh='<p><strong>التفاصيل:</strong></p><div class="details-box">'+makeLinkIfUrl(fd)+'</div>'}}if(isValidUrl(it.link_url)&&String(it.link_url).trim()!==String(it.desc).trim()){let su=it.link_url.trim();lh+='<p><strong>الرابط:</strong> <a href="'+su+'" target="_blank">فتح الرابط</a> '+createCopyBtn(su)+'</p>'}if(isValidUrl(it.sub_go_pos)&&String(it.sub_go_pos).trim()!==String(it.desc).trim()&&String(it.sub_go_pos).trim()!==String(it.link_url).trim()){let su=it.sub_go_pos.trim();lh+='<p><strong>رابط التحويل:</strong> <a href="'+su+'" target="_blank">فتح الرابط</a> '+createCopyBtn(su)+'</p>'}const fu=fixImageUrl(it.image_url);let ig='<img src="'+fu+'" loading="lazy" alt="News" onclick="toggleCard(this)" onerror="this.onerror=null;this.src=\''+placeholderImageAr+'\';">';if(!fu)ig='<img src="'+placeholderImageAr+'" loading="lazy" onclick="toggleCard(this)" alt="قريباً">';let dlh=fu?'<p style="margin-top:8px;"><strong>تحميل الصورة:</strong> '+createDownloadBtn(fu)+'</p>':'';let ft=formatFreeFireText(it.title||'N/A');return ig+'<div class="data-card-header" onclick="toggleCard(this)"><p class="data-card-title">'+ft+'</p><span class="toggle-icon">&#9660;</span></div><div class="data-card-details"><div class="data-card-info"><p><strong>البداية:</strong> <span style="display:inline-block;direction:ltr;">'+formatTimestamp(it.start_time)+'</span></p><p><strong>النهاية:</strong> <span style="display:inline-block;direction:ltr;">'+formatTimestamp(it.end_time)+'</span></p>'+dh+lh+dlh+'</div></div>'}
</script>
