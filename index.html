<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع متوقف مؤقتاً</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #d9534f; }
        p { font-size: 1.2rem; color: #666; line-height: 1.6; }
        .icon { font-size: 50px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>عذراً، الموقع متوقف حالياً</h1>
        <p>نعتذر هذا الموقع متوقف حالياً للصيانة أو لأسباب أخرى، وسنعود للعمل في أقرب وقت ممكن. شكراً لتفهمكم.</p>
    </div>
</body>
</html>
